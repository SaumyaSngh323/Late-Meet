name: Issue Auto Labeler

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-label:
    runs-on: ubuntu-latest

    steps:
      - name: Apply Labels
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase()

            let labels = []

            if (title.includes("bug")) labels.push("bug")
            if (title.includes("docs")) labels.push("documentation")
            if (title.includes("ui")) labels.push("ui")
            if (title.includes("feature")) labels.push("enhancement")
            if (title.includes("performance")) labels.push("performance")
            if (title.includes("test")) labels.push("testing")

            if (labels.length > 0) {
              github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels
              })
            }
